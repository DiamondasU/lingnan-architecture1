<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文献检索</title>
  <link rel="stylesheet" href="../assets/css/site.css">
</head>
<body>
  <div class="site">
    <div id="app-shell"></div>
    <main class="layout-grid">
      <aside class="panel">
        <h2 class="section-title">实时检索</h2>
        <div class="field">
          <label class="label-row" for="query-input"><span>主题关键词</span><span class="helper">OpenAlex + Crossref</span></label>
          <input id="query-input" placeholder="例如：岭南园林、开平碉楼、西关大屋">
        </div>
        <div class="field">
          <label class="label-row" for="person-input"><span>人物关键词</span><span class="helper">作者筛选</span></label>
          <input id="person-input" placeholder="例如：梁思成">
        </div>
        <div class="field">
          <label class="label-row" for="language-select"><span>语言</span></label>
          <select id="language-select">
            <option value="">不限</option>
            <option value="zh">中文</option>
            <option value="en">英文</option>
          </select>
        </div>
        <div class="field">
          <label class="label-row" for="type-select"><span>文献类型</span></label>
          <select id="type-select">
            <option value="">不限</option>
            <option value="journal-article">期刊论文</option>
            <option value="book-chapter">章节</option>
            <option value="book">图书</option>
            <option value="dissertation">学位论文</option>
            <option value="report">报告</option>
            <option value="conference-paper">会议论文</option>
            <option value="posted-content">预印本</option>
          </select>
        </div>
        <div class="field">
          <label class="label-row"><span>朝代</span></label>
          <div id="dynasty-chips" class="chip-row"></div>
        </div>
        <div class="field">
          <label class="label-row"><span>建筑群</span></label>
          <div id="group-chips" class="chip-row"></div>
        </div>
        <div class="field">
          <label class="label-row" for="from-year"><span>年份范围</span></label>
          <div class="folder-row">
            <input id="from-year" placeholder="起始年">
            <input id="to-year" placeholder="结束年">
          </div>
        </div>
        <div class="field">
          <label><input id="oa-toggle" type="checkbox"> 仅显示开放获取</label>
        </div>
        <div class="card-actions">
          <button class="button button-primary" id="run-search" type="button">开始检索</button>
          <button class="button button-secondary" id="reset-search" type="button">重置</button>
        </div>
      </aside>

      <section class="content-panel">
        <div id="search-status"></div>
        <div id="results-grid" class="record-grid"></div>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/search.js"></script>
</body>
</html>
