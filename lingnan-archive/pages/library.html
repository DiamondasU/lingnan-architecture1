<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收藏与历史</title>
  <link rel="stylesheet" href="../assets/css/site.css">
</head>
<body>
  <div class="site">
    <div id="app-shell"></div>
    <main class="layout-grid">
      <aside class="panel">
        <h2 class="section-title">收藏夹管理</h2>
        <div class="field">
          <label class="label-row" for="folder-select"><span>当前收藏夹</span></label>
          <select id="folder-select"></select>
        </div>
        <div class="field">
          <label class="label-row" for="folder-input"><span>新建收藏夹</span></label>
          <div class="folder-row">
            <input id="folder-input" placeholder="输入名称">
            <button class="button button-secondary" id="create-folder" type="button">新建</button>
          </div>
        </div>
        <div class="card-actions">
          <button class="button button-secondary" id="clear-history" type="button">清空历史</button>
        </div>
      </aside>

      <section class="content-panel">
        <section>
          <h2 class="section-title">当前收藏夹内容</h2>
          <div id="favorites-grid" class="mini-grid"></div>
        </section>
        <section>
          <h2 class="section-title">最近历史</h2>
          <div id="history-grid" class="mini-grid"></div>
        </section>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/library.js"></script>
</body>
</html>
